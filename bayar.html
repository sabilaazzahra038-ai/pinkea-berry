<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Pinkéa Berry Beauty | Pembayaran</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS (Konsisten Pink) -->
    <style>
        :root {
            --pink-primary: #FF8E9E;
            --pink-secondary: #FFD1D7;
            --pink-dark: #D85C6D;
            --light-bg: #FFF5F6;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: #e0346a;
        }
        .bg-pink-nav {
            background-color: #ffffff;
            border-bottom: 2px solid var(--pink-secondary);
        }
        .btn-pink {
            background-color: var(--pink-primary);
            color: white;
            border-radius: 20px;
            transition: all 0.3s;
        }
        .btn-pink:hover {
            background-color: var(--pink-dark);
            color: white;
        }
        .checkout-header {
            background: linear-gradient(135deg, var(--pink-secondary) 0%, #FFF5F6 100%);
            padding: 60px 0;
            text-align: center;
        }
        .form-card {
            background-color: #ffffff;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 142, 158, 0.12);
        }
        /* Mengubah warna border form saat diklik agar tetap pink */
        .form-control:focus, .form-select:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 0.25px rgba(255, 142, 158, 0.5);
        }
        footer {
            background-color: #e03465;
            color: #f8f9fa;
        }
        /* Style Tambahan untuk Foto Artis Samping */
        .artist-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(255, 142, 158, 0.1);
            border: 3px solid var(--pink-secondary);
        }
    </style>
</head>
<body>

    <!-- ================= NAVBAR (HEADER) ================= -->
    <nav class="navbar navbar-expand-lg bg-pink-nav sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html" style="color: var(--pink-dark);">
                <i class="bi bi-sparkles"></i>  Pinkéa Berry Beauty
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link text-dark" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link text-dark" href="tentang.html">Tentang</a></li>
                    <li class="nav-item"><a class="nav-link text-dark" href="katalog.html">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link active fw-semibold" href="bayar.html" style="color: var(--pink-dark);">Bayar</a></li>
                    <li class="nav-item"><a class="nav-link text-dark" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <main>
        <!-- Header Halaman -->
        <section class="checkout-header mb-5">
            <div class="container">
                <h1 class="fw-bold text-dark">Form Pembayaran</h1>
                <p class="text-muted">Selesaikan pesananmu dan bersiaplah untuk tampil berkilau!</p>
            </div>
        </section>

        <!-- Form Section dengan Foto Artis Kanan-Kiri -->
        <section class="container my-5">
            <div class="row align-items-stretch justify-content-center g-4">
                
                <!-- Foto Artis Kiri (Hanya muncul di layar komputer/laptop) -->
                <div class="col-lg-3 d-none d-lg-block">
                    <img src="haileycover.jpeg" alt="Artis GlowPink" class="artist-img">
                </div>

                <!-- Form Utama (Di Tengah) -->
                <div class="col-lg-6 col-md-10">
                    <div class="card form-card p-4 p-md-5 h-100">
                        <h4 class="fw-bold mb-4" style="color: var(--pink-dark);"><i class="bi bi-credit-card-2-front"></i> Informasi Pelanggan & Pesanan</h4>
                        
                        <!-- Form Start -->
                        <form id="paymentForm">
                            <div class="row g-3">
                                <!-- Nama Lengkap -->
                                <div class="col-md-6">
                                    <label for="namaLengkap" class="form-label fw-semibold">Nama Lengkap</label>
                                    <input type="text" class="form-dash-control form-control" id="namaLengkap" placeholder="Masukkan nama lengkap" required>
                                </div>

                                <!-- No WhatsApp -->
                                <div class="col-md-6">
                                    <label for="noHp" class="form-label fw-semibold">Nomor WhatsApp</label>
                                    <input type="tel" class="form-control" id="noHp" placeholder="Contoh: 081234567xx" required>
                                </div>

                                <!-- Pilih Produk -->
                                <div class="col-12">
                                    <label for="pilihProduk" class="form-label fw-semibold">Pilih Produk Kosmetik</label>
                                    <select class="form-select" id="pilihProduk" required>
                                        <option value="" disabled selected>-- Pilih Produk --</option>
                                        <option value="Velvet Matte Lipstick (Rp 85.000)">Velvet Matte Lipstick - Rp 85.000</option>
                                        <option value="Flawless Cushion (Rp 150.000)">Flawless Cushion - Rp 150.000</option>
                                        <option value="Pinkish Palette Eyeshadow (Rp 120.000)">Pinkish Palette Eyeshadow - Rp 120.000</option>
                                        <option value="Liquid Cheek Blush (Rp 75.000)">Liquid Cheek Blush - Rp 75.000</option>
                                        <option value="Hyperlash Mascara (Rp 95.000)">Hyperlash Mascara - Rp 95.000</option>
                                    </select>
                                </div>

                                <!-- Metode Pembayaran -->
                                <div class="col-12">
                                    <label class="form-label fw-semibold d-block">Metode Pembayaran</label>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="metodeBayar" id="transferBank" value="Transfer Bank" checked>
                                        <label class="form-check-input-label form-check-label" for="transferBank">Transfer Bank (BCA/Mandiri)</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="metodeBayar" id="eWallet" value="E-Wallet (Dana/Gopay)">
                                        <label class="form-check-label" for="eWallet">E-Wallet (Dana/OVO/Gopay)</label>
                                    </div>
                                </div>

                                <!-- Alamat Pengiriman -->
                                <div class="col-12">
                                    <label for="alamat" class="form-label fw-semibold">Alamat Lengkap Pengiriman</label>
                                    <textarea class="form-control" id="alamat" rows="3" placeholder="Nama jalan, nomor rumah, kecamatan, kota..." required></textarea>
                                </div>

                                <!-- Tombol Submit -->
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-pink btn-lg px-5 w-100 shadow-sm">Bayar Sekarang</button>
                                </div>
                            </div>
                        </form>
                        <!-- Form End -->

                    </div>
                </div>

                <!-- Foto Artis Kanan (Hanya muncul di layar komputer/laptop) -->
                <div class="col-lg-3 d-none d-lg-block">
                    <img src="khylie2.jpeg" alt="Artis GlowPink" class="artist-img">
                </div>

            </div>
        </section>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="py-4 mt-5">
        <div class="container text-center">
            <h5 class="fw-bold mb-2" style="color: var(--pink-primary);"><i class="bi bi-sparkles"></i> Pinkéa Berry Beauty</h5>
            <p class="small text-muted mb-3">Tugas Projek UAS TIK - © 2026</p>
            <div class="d-flex justify-content-center gap-3 fs-5 mb-3">
                <a href="#" class="text-white-50"><i class="bi bi-instagram"></i></a>
                <a href="#" class="text-white-50"><i class="bi bi-tiktok"></i></a>
                <a href="#" class="text-white-50"><i class="bi bi-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- ================= JAVASCRIPT CUSTOM (Logika Interaktif) ================= -->
    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(event) {
            // Mencegah halaman refresh otomatis saat form disubmit
            event.preventDefault(); 
            
            // Mengambil data dari inputan form
            const nama = document.getElementById('namaLengkap').value;
            const produk = document.getElementById('pilihProduk').value;
            const metode = document.querySelector('input[name="metodeBayar"]:checked').value;

            // Memunculkan pesan alert interaktif
            alert(`Halo ${nama}!\n\nPesanan produk "${produk}" berhasil dibuat.\nSilakan lakukan pembayaran via ${metode}.\n\nDetail konfirmasi akan kami kirim ke nomor WhatsApp Anda. Terima kasih! ✨`);
            
            // Mereset isi form kembali kosong setelah klik OK pada alert
            this.reset();
        });
    </script>
</body>
</html>
